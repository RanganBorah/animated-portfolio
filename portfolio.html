<script>
(function () {
  const SRC = "https://stream.mux.com/Aa02T7oM1wH5Mk5EEVDYhbZ1ChcdhRsS2m1NYyx4Ua1g.m3u8";
  const video = document.getElementById("bg-hls");
  const container = document.getElementById("bg-frames");
  if (!video || !container) return;

  // Wire up HLS playback
  const supportsNative = video.canPlayType("application/vnd.apple.mpegurl") !== "";
  if (supportsNative) {
    video.src = SRC;
  } else if (window.Hls && Hls.isSupported()) {
    const hls = new Hls({ lowLatencyMode: false });
    hls.loadSource(SRC);
    hls.attachMedia(video);
  } else {
    // last-ditch fallback
    video.src = SRC;
  }

  const tryPlay = () => { const p = video.play(); if (p && p.catch) p.catch(() => {}); };
  video.addEventListener("loadeddata", tryPlay, { once: true });
  video.addEventListener("canplay", tryPlay, { once: true });
  tryPlay();

  // Subtle parallax on scroll
  let parallax = 0, targetParallax = 0, rafId = null;
  const compute = () => {
    targetParallax = -window.scrollY * 0.07;
    if (!rafId) rafId = requestAnimationFrame(tick);
  };
  const tick = () => {
    rafId = null;
    parallax += (targetParallax - parallax) * 0.22;
    container.style.transform = `translate3d(0, ${parallax.toFixed(2)}px, 0) scale(1.06)`;
    if (Math.abs(targetParallax - parallax) > 0.1) rafId = requestAnimationFrame(tick);
  };
  window.addEventListener("scroll", compute, { passive: true });
  window.addEventListener("resize", compute);
  compute();
})();
</script>

<script type="text/babel" data-presets="env,react">
const FM = window.Motion || window.framerMotion || window.FramerMotion;
const M = FM.motion;
const useScrollFM = FM.useScroll;
const useTransformFM = FM.useTransform;

const { useRef, useEffect, useState, useMemo } = React;

/* ============= FADE IN ============= */
function FadeIn({ children, delay=0, duration=0.7, y=30, x=0, as="div", className="", ...rest }) {
  const MotionTag = M[as] || M.div;
  return (
    <MotionTag
      className={className}
      initial={{ opacity: 0, y, x }}
      whileInView={{ opacity: 1, y: 0, x: 0 }}
      viewport={{ once: true, margin: "50px", amount: 0 }}
      transition={{ duration, delay, ease: [0.25, 0.1, 0.25, 1] }}
      {...rest}
    >
      {children}
    </MotionTag>
  );
}

/* ============= MAGNET ============= */
function Magnet({ children, padding=140, strength=3, className="", style={} }) {
  const ref = useRef(null);
  const [active, setActive] = useState(false);
  const [pos, setPos] = useState({ x: 0, y: 0 });
  useEffect(() => {
    const onMove = (e) => {
      const el = ref.current;
      if (!el) return;
      const r = el.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const dx = e.clientX - cx;
      const dy = e.clientY - cy;
      const within = Math.abs(dx) < r.width/2 + padding && Math.abs(dy) < r.height/2 + padding;
      if (within) {
        setActive(true);
        setPos({ x: dx / strength, y: dy / strength });
      } else {
        setActive(false);
        setPos({ x: 0, y: 0 });
      }
    };
    window.addEventListener("mousemove", onMove);
    return () => window.removeEventListener("mousemove", onMove);
  }, [padding, strength]);
  return (
    <div
      ref={ref}
      className={className}
      style={{
        ...style,
        transform: `translate3d(${pos.x}px, ${pos.y}px, 0)`,
        transition: active ? "transform 0.3s ease-out" : "transform 0.6s ease-in-out",
        willChange: "transform",
      }}
    >
      {children}
    </div>
  );
}

/* ============= ANIMATED CHAR TEXT ============= */
function AnimatedText({ text, className="", style={} }) {
  const ref = useRef(null);
  const { scrollYProgress } = useScrollFM({
    target: ref,
    offset: ["start 0.85", "end 0.3"],
  });
  const chars = useMemo(() => Array.from(text), [text]);
  return (
    <p ref={ref} className={className} style={{ position: "relative", ...style }}>
      {chars.map((ch, i) => (
        <Char key={i} index={i} total={chars.length} progress={scrollYProgress} ch={ch} />
      ))}
    </p>
  );
}
function Char({ ch, index, total, progress }) {
  const start = index / total;
  const end = start + 1 / total;
  const opacity = useTransformFM(progress, [start, end], [0.18, 1]);
  return (
    <span style={{ position: "relative", display: "inline" }}>
      <span style={{ opacity: 0.18 }}>{ch}</span>
      <M.span
        aria-hidden
        style={{
          position: "absolute",
          left: 0, top: 0,
          opacity,
          color: "#F4EDDC",
        }}
      >
        {ch}
      </M.span>
    </span>
  );
}

function MarqueeSection() {
  const sectionRef = useRef(null);
  const [offset, setOffset] = useState(0);
  useEffect(() => {
    const onScroll = () => {
      const el = sectionRef.current;
      if (!el) return;
      const r = el.getBoundingClientRect();
      const top = r.top + window.scrollY;
      const o = (window.scrollY - top + window.innerHeight) * 0.3;
      setOffset(o);
    };
    onScroll();
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  const row1 = STACK_TILES.slice(0, 11);
  const row2 = STACK_TILES.slice(11);
  const triple = (arr) => [...arr, ...arr, ...arr];

  return (
    <section ref={sectionRef} className="pt-24 sm:pt-32 md:pt-40 pb-10 overflow-hidden relative has-video-bg">
      <div className="px-6 md:px-10 mb-10 flex justify-between items-end">
        <FadeIn>
          <h2 className="font-medium uppercase tracking-[0.04em] text-[#F4EDDC] leading-none"
              style={{ fontSize: "clamp(1.5rem, 3.6vw, 3.25rem)" }}>
            Toolkit
          </h2>
        </FadeIn>
        <FadeIn delay={0.1}>
          <span className="mono text-xs sm:text-sm uppercase tracking-[0.25em] text-[#D7E2EA]/55 hidden sm:inline">
            scroll to scrub →
          </span>
        </FadeIn>
      </div>

      <div className="flex flex-col gap-3">
        <div className="flex gap-3" style={{ transform: `translateX(${offset - 200}px)`, willChange: "transform" }}>
          {triple(row1).map((t, i) => (
            <div key={`r1-${i}`} className="marquee-card grain">
              <TileVisual tile={t}/>
              <div className="tag">{t.tag}</div>
              <div className="label">{t.label}</div>
            </div>
          ))}
        </div>
        <div className="flex gap-3" style={{ transform: `translateX(${-(offset - 200)}px)`, willChange: "transform" }}>
          {triple(row2).map((t, i) => (
            <div key={`r2-${i}`} className="marquee-card grain">
              <TileVisual tile={t}/>
              <div className="tag">{t.tag}</div>
              <div className="label">{t.label}</div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}
